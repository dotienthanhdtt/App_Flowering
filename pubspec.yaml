name: flowering
description: "AI Language Learning App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Network
  dio: ^5.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  record: ^6.2.0
  audioplayers: ^5.2.1
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0

  # Localization
  intl: ^0.19.0

  # Environment
  flutter_dotenv: ^5.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1

  # Connectivity
  connectivity_plus: ^6.0.3

  # In-App Purchases
  purchases_flutter: ^8.0.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Social Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Utils
  uuid: ^4.3.3
  path_provider: ^2.1.2
  lucide_icons: ^0.257.0
  flutter_widget_from_html_core: ^0.17.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  mockito: ^5.4.4
  build_test: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/
    - assets/images/onboarding/
    - .env.dev
    - .env.prod
